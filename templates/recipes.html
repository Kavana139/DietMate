{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Healthy Recipes</h1>

<div class="recipes-bar">
    <input type="text" class="search-box" id="recipeSearch" placeholder="Search recipes..." oninput="filterRecipes()">
    <div class="filter-group">
        <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
        <button class="filter-chip" onclick="setFilter('low-cal',this)">Low Calorie</button>
        <button class="filter-chip" onclick="setFilter('high-protein',this)">High Protein</button>
    </div>
</div>

<p class="recipe-count" id="recipeCount">{{ recipes|length }} recipes found</p>

<div class="recipes-grid" id="recipesGrid">
{% for recipe in recipes %}
<div class="recipe-card"
     data-name="{{ recipe[1]|lower }}"
     data-calories="{{ recipe[2] }}"
     data-protein="{{ recipe[3] }}">
    <div class="recipe-card-accent"></div>
    <div class="recipe-card-body">
        <div class="recipe-title">{{ recipe[1] }}</div>
        <div class="recipe-macros">
            <div class="recipe-macro"><div class="recipe-macro-val">{{ recipe[2] }}</div><div class="recipe-macro-name">Cal</div></div>
            <div class="recipe-macro"><div class="recipe-macro-val">{{ recipe[3] }}g</div><div class="recipe-macro-name">Protein</div></div>
            <div class="recipe-macro"><div class="recipe-macro-val">{{ recipe[4] }}g</div><div class="recipe-macro-name">Carbs</div></div>
            <div class="recipe-macro"><div class="recipe-macro-val">{{ recipe[5] }}g</div><div class="recipe-macro-name">Fat</div></div>
        </div>
        <a href="/recipe/{{ recipe[0] }}" class="view-recipe-btn">View Recipe</a>
    </div>
</div>
{% endfor %}
</div>

<script>
var activeFilter = 'all';
function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterRecipes();
}
function filterRecipes() {
    var q = document.getElementById('recipeSearch').value.toLowerCase().trim();
    var cards = document.querySelectorAll('.recipe-card');
    var n = 0;
    cards.forEach(function(card) {
        var matchName = !q || card.dataset.name.includes(q);
        var cal = parseInt(card.dataset.calories);
        var pro = parseInt(card.dataset.protein);
        var mf = activeFilter === 'all' ? true : activeFilter === 'low-cal' ? cal <= 300 : pro >= 15;
        var show = matchName && mf;
        card.style.display = show ? 'flex' : 'none';
        if (show) n++;
    });
    document.getElementById('recipeCount').textContent = n + ' recipe' + (n !== 1 ? 's' : '') + ' found';
}
</script>

{% endblock %}
